cd ~/ReiAlaricVPN && cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rei Alaric VPN</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ffcc;
  font-family:Arial;
  text-align:center;
}

h1{margin-top:80px;}

button{
  padding:15px 30px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
  margin-top:40px;
}

.on{background:#00ffcc;color:black;}
.off{background:#ff004c;color:white;}

p{color:#aaa;margin-top:20px;}
</style>
</head>

<body>

<h1>𓆩 Rei Alaric VPN 𓆪</h1>

<button id="btn" class="off" onclick="toggle()">ATIVAR VPN</button>

<p id="status">VPN DESATIVADA</p>
<p id="net">REDE: carregando...</p>

<script>
let active=false;

function toggle(){
active=!active;
let b=document.getElementById("btn");
let s=document.getElementById("status");

if(active){
b.innerText="DESATIVAR VPN";
b.className="on";
s.innerText="VPN ATIVADA";
}else{
b.innerText="ATIVAR VPN";
b.className="off";
s.innerText="VPN DESATIVADA";
}
}

let c=navigator.connection;
document.getElementById("net").innerText=
c ? "REDE: "+(c.effectiveType||"desconhecida") : "REDE: não disponível";
</script>

</body>
</html>
EOF
