
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rei Alaric VPN</title>

<style>
body{
  margin:0;
  background:linear-gradient(180deg,#000,#001a1a);
  color:#00ffcc;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:60px;
  text-shadow:0 0 15px #00ffcc;
}

.card{
  margin-top:40px;
  display:inline-block;
  padding:25px;
  border:1px solid #00ffcc;
  border-radius:15px;
  box-shadow:0 0 25px #00ffcc33;
}

button{
  padding:15px 35px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
}

.on{background:#00ffcc;color:#000;}
.off{background:#ff004c;color:#fff;}

.info{
  margin-top:15px;
  color:#aaa;
  font-size:14px;
}
</style>
</head>

<body>

<h1>𓆩 Rei Alaric VPN 𓆪</h1>

<div class="card">

<button id="btn" class="off" onclick="toggle()">ATIVAR VPN</button>

<p id="status">🔴 DESATIVADA</p>
<p id="time">TEMPO: 00:00:00</p>
<p id="device">DISPOSITIVO: carregando...</p>
<p id="net">REDE: carregando...</p>

</div>

<script>
let active = false;
let seconds = 0;
let timer = null;

function formatTime(s){
  let h = Math.floor(s/3600);
  let m = Math.floor((s%3600)/60);
  let sec = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function toggle(){
  active = !active;

  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  if(active){
    btn.innerText = "DESATIVAR VPN";
    btn.className = "on";
    status.innerText = "🟢 VPN ATIVADA";

    timer = setInterval(()=>{
      seconds++;
      document.getElementById("time").innerText =
      "TEMPO: " + formatTime(seconds);
    },1000);

  }else{
    btn.innerText = "ATIVAR VPN";
    btn.className = "off";
    status.innerText = "🔴 DESATIVADA";

    clearInterval(timer);
    seconds = 0;
    document.getElementById("time").innerText = "TEMPO: 00:00:00";
  }
}

// dispositivo (limitado navegador)
document.getElementById("device").innerText =
"DISPOSITIVO: " + navigator.userAgent.slice(0,40) + "...";

// rede
let conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

document.getElementById("net").innerText =
conn ? "REDE: " + (conn.effectiveType || "desconhecida") : "REDE: não disponível";
</script>

</body>
</html>
EOF
